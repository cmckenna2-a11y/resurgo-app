  /* ── TABS ── */

  /* ── STREAK ── */

  /* ── BREATHING ── */
  .breath-wrap { display: flex; flex-direction: column; align-items: center; padding: 1rem 0; }
  .phase-label { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; min-height: 32px; letter-spacing: -0.3px; }
  .phase-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; text-align: center; }

  .btn-full.primary { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }
  .btn-full.primary:hover { opacity: 0.88; }

  /* ── CATEGORY BUTTONS ── */
  .cat-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .cat-btn { font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--warm-gray); color: var(--text-muted); cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.15s; }
  .cat-btn.teal.active { background: var(--green-pale); color: var(--green-dark); border-color: var(--green-mid); font-weight: 700; }
  .cat-btn.purple2.active { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple-text); font-weight: 700; }

  .prompt-card.selected .prompt-tip { color: var(--green-dark); }

  .write-area:focus { outline: none; border-color: var(--green-mid); }

  .closer-box { background: var(--amber-bg); border-radius: 12px; padding: 12px 14px; font-size: 13px; color: var(--amber-text); line-height: 1.6; margin-bottom: 12px; border-left: 3px solid #C4900A; }
  .closer-label { font-size: 11px; color: #8B6010; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  .saved-title { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
  .saved-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.7; }
  .again-btn { font-size: 13px; color: var(--green-dark); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: inherit; font-weight: 600; }

  /* ── PRE-GAME ── */
  .progress-bar-bg { height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 18px; }

  .step-card { background: #fff; border: 1.5px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 10px; }

  .shuffle-btn { font-size: 12px; color: var(--purple-text); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: inherit; margin-bottom: 12px; display: block; font-weight: 600; }
  .timer-big { font-size: 42px; font-weight: 800; color: var(--text-primary); text-align: center; margin-bottom: 14px; letter-spacing: -1px; }
  .two-btns { display: flex; gap: 8px; }

  .complete-screen { text-align: center; padding: 2.5rem 1rem; }

  .logout-btn { width: 100%; padding: 13px; border-radius: 12px; border: 1.5px solid #F09595; background: none; color: var(--red-text); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 16px; transition: background 0.15s; }

  .burnout-q { margin-bottom: 20px; }

  .burnout-btn { flex: 1; padding: 10px 4px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--warm-gray); font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; font-family: inherit; text-align: center; transition: all 0.15s; }

<script>
// Simple in-memory user store

// ── DATA MIGRATION: steady_ keys → resurgo_ keys ──
(function migrateData() {
  var keyMap = [
    ['steady_users', 'resurgo_users'],
    ['steady_session', 'resurgo_session'],
    ['steady_submissions', 'resurgo_submissions']
  ];

  // Migrate fixed keys
  keyMap.forEach(function(pair) {
    var oldKey = pair[0], newKey = pair[1];
    if (localStorage.getItem(oldKey) && !localStorage.getItem(newKey)) {
      localStorage.setItem(newKey, localStorage.getItem(oldKey));
      localStorage.removeItem(oldKey);
    }
  });

  // Migrate dynamic keys (mood, journal per user)
  var keysToMigrate = [];
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && k.indexOf('steady_') === 0) {
      keysToMigrate.push(k);
    }
  }
  keysToMigrate.forEach(function(oldKey) {
    var newKey = oldKey.replace('steady_', 'resurgo_');
    if (!localStorage.getItem(newKey)) {
      localStorage.setItem(newKey, localStorage.getItem(oldKey));
    }
    localStorage.removeItem(oldKey);
  });
})();

const USERS = JSON.parse(localStorage.getItem('resurgo_users') || '{}');
let currentUser = JSON.parse(localStorage.getItem('resurgo_session') || 'null');

function saveUsers() { localStorage.setItem('resurgo_users', JSON.stringify(USERS)); }
function saveSession(u) { localStorage.setItem('resurgo_session', JSON.stringify(u)); currentUser = u; }
function clearSession() { localStorage.removeItem('resurgo_session'); currentUser = null; }

function getInitials(name) {
  return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

// ── RENDER ROUTER ──
function render() {

}

// ── LANDING ──

let selectedRole = 'student';
function selectRole(r) {
  selectedRole = r;
  document.getElementById('role-student').className = 'role-btn' + (r === 'student' ? ' selected' : '');
  document.getElementById('role-athlete').className = 'role-btn' + (r === 'athlete' ? ' selected' : '');
}

function doSignup() {
  const name = document.getElementById('su-name').value.trim();
  const email = document.getElementById('su-email').value.trim().toLowerCase();
  const pass = document.getElementById('su-pass').value;
  const errEl = document.getElementById('su-error');
  if (!name) { showErr(errEl, 'Please enter your name.'); return; }
  if (!email.includes('@')) { showErr(errEl, 'Please enter a valid email.'); return; }
  if (pass.length < 6) { showErr(errEl, 'Password must be at least 6 characters.'); return; }
  const ageCheck = document.getElementById('su-age');
  if (!ageCheck || !ageCheck.checked) { showErr(errEl, 'Please confirm you are 18 or older to create an account.'); return; }
  if (USERS[email]) { showErr(errEl, 'An account with this email already exists.'); return; }
  USERS[email] = { name, email, pass, role: selectedRole };
  saveUsers();
  saveSession({ name, email, role: selectedRole });
  onboardingStep = 0;
  onboardingAnswers = {};
  renderOnboarding();
}

// ── LOGIN ──
function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="auth-screen">
      <button onclick="renderLanding()" style="background:none;border:none;color:#888;font-size:13px;cursor:pointer;margin-bottom:1.5rem;text-align:left;font-family:inherit;">← Back</button>

}

function doLogin() {
  const email = document.getElementById('li-email').value.trim().toLowerCase();
  const pass = document.getElementById('li-pass').value;
  const errEl = document.getElementById('li-error');
  if (!email || !pass) { showErr(errEl, 'Please fill in all fields.'); return; }
  const user = USERS[email];
  if (!user || user.pass !== pass) { showErr(errEl, 'Incorrect email or password.'); return; }
  saveSession({ name: user.name, email: user.email, role: user.role, onboarding: user.onboarding || {} });
  renderApp();
}

let onboardingStep = 0;

const ONBOARDING_STEPS = [
  {
    id: 'struggle',
    emoji: '💭',
    title: 'What brings you to Resurgo?',
    sub: 'We will personalize your experience around this.',
    type: 'single',
    options: ['Academic stress & burnout', 'Anxiety & overwhelming thoughts', 'Performance & confidence', 'Injury & recovery', 'Just need a space to decompress']
  },
  {
    id: 'faith',
    emoji: '🙏',
    title: 'Does faith or spirituality play a role in your wellbeing?',
    sub: 'This helps us personalize your guidance and language.',
    type: 'single',
    options: ['Christianity', 'Islam', 'Judaism', 'Hinduism', 'Buddhism', 'Spiritual but not religious', 'Not really', 'Prefer not to say']
  },
  {
    id: 'injury',
    emoji: '🏥',
    title: 'Are you currently competing or recovering?',

    athleteOnly: true,

];

function renderOnboarding() {
  const steps = ONBOARDING_STEPS.filter(s => !s.athleteOnly || currentUser.role === 'athlete');
  const step = steps[onboardingStep];
  const total = steps.length;
  const pct = Math.round((onboardingStep / total) * 100);
  const selected = onboardingAnswers[step.id] || [];

  document.getElementById('app').innerHTML = `
    <div class="auth-screen">
      <div style="margin-bottom:1rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-size:12px;color:#aaa;">${onboardingStep + 1} of ${total}</span>
          <button onclick="renderApp()" style="font-size:12px;color:#aaa;background:none;border:none;cursor:pointer;font-family:inherit;">Skip</button>
        </div>
        <div style="height:4px;background:#f0f0ec;border-radius:2px;">
          <div style="height:4px;background:#1D9E75;border-radius:2px;width:${pct}%;transition:width 0.3s;"></div>
        </div>
      </div>
      <div style="font-size:36px;margin-bottom:12px;">${step.emoji}</div>
      <div class="auth-title" style="margin-bottom:4px;">${step.title}</div>
      <div class="auth-sub" style="margin-bottom:1.5rem;">${step.sub}</div>
      <div id="ob-options" style="display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem;">
        ${step.options.map(opt => `
          <button class="ob-opt${selected.includes(opt) ? ' ob-selected' : ''}" onclick="obToggle('${opt.replace(/'/g,"\\'")}', '${step.type}')">
            <span>${opt}</span>
            <span class="ob-check" style="opacity:${selected.includes(opt)?1:0};">✓</span>
          </button>`).join('')}
      </div>
      <button class="auth-btn" onclick="obNext()" ${selected.length === 0 ? 'disabled' : ''} id="ob-next-btn">
        ${onboardingStep === total - 1 ? 'Finish setup' : 'Continue'}
      </button>
    </div>`;
}

function obToggle(opt, type) {
  const steps = ONBOARDING_STEPS.filter(s => !s.athleteOnly || currentUser.role === 'athlete');
  const step = steps[onboardingStep];
  let sel = onboardingAnswers[step.id] || [];
  if (type === 'single') {
    sel = [opt];
  } else {
    if (sel.includes(opt)) sel = sel.filter(x => x !== opt);
    else sel = [...sel, opt];
  }
  onboardingAnswers[step.id] = sel;
  document.querySelectorAll('.ob-opt').forEach(b => {
    const txt = b.querySelector('span').textContent;
    const chk = b.querySelector('.ob-check');
    if (sel.includes(txt)) { b.classList.add('ob-selected'); chk.style.opacity = 1; }
    else { b.classList.remove('ob-selected'); chk.style.opacity = 0; }
  });
  const nb = document.getElementById('ob-next-btn');
  if (nb) nb.disabled = sel.length === 0;
}

function obNext() {
  const steps = ONBOARDING_STEPS.filter(s => !s.athleteOnly || currentUser.role === 'athlete');
  onboardingStep++;
  if (onboardingStep >= steps.length) {
    // Save answers to user profile
    const updated = { ...currentUser, onboarding: onboardingAnswers };
    USERS[currentUser.email] = { ...USERS[currentUser.email], onboarding: onboardingAnswers };
    saveUsers();
    saveSession(updated);
    renderWelcomeDone();
  } else {
    renderOnboarding();
  }
}

    document.getElementById('pref-panel-title').textContent = meta.title;
    document.getElementById('pref-panel-sub').textContent = meta.sub;

      else editingSelected = [...editingSelected, opt];

      const txt = b.querySelector('span').textContent;
      const chk = b.querySelector('.ob-check');
      if (editingSelected.includes(txt)) { b.classList.add('ob-selected'); chk.style.opacity = 1; }
      else { b.classList.remove('ob-selected'); chk.style.opacity = 0; }
    });
  };

  window.savePrefEdit = function() {
    if (!editingSelected.length) return;
    const ob = currentUser.onboarding || {};
    ob[editingKey] = editingSelected;
    const updated = { ...currentUser, onboarding: ob };
    USERS[currentUser.email] = { ...USERS[currentUser.email], onboarding: ob };

    // If faith changed, do full re-render so all screens update
    if (editingKey === 'faith') {
      renderApp();
      showTab('you');

    // Re-init journal (updates faith journal prompt)

    if (isAth) { pgStep=0; pgText=new Array(6).fill(''); pgAffirm=0; initPregame(); }
  };

    editingKey = null;
    editingSelected = [];
  };

function saveMoodEntry(mood) {
  const key = 'resurgo_mood_' + currentUser.email;
  const history = JSON.parse(localStorage.getItem(key) || '[]');
  const today = new Date().toISOString().split('T')[0];
  const filtered = history.filter(e => e.date !== today);
  filtered.push({ date: today, mood: mood, ts: Date.now() });
  filtered.sort((a,b) => a.date.localeCompare(b.date));
  localStorage.setItem(key, JSON.stringify(filtered.slice(-90)));

  // Crisis escalation — tiered by consecutive rough days
  var sorted = filtered.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });
  var roughStreak = 0;
  for (var i = 0; i < sorted.length; i++) {
    if (sorted[i].mood === 1) roughStreak++;
    else break;
  }
  if (roughStreak >= 3) {
    setTimeout(function(){ showCrisisPrompt(2); }, 300);
  } else if (roughStreak === 2) {
    setTimeout(function(){ showCrisisPrompt(1); }, 300);
  }
}

// ── BREATHING ──
function initBreathing() {
  const CIRC = 2 * Math.PI * 84;
  const PHASES = [
    { name: 'Inhale', sub: 'breathe in slowly through your nose', dur: 4, color: '#1D9E75' },
    { name: 'Hold',   sub: 'hold your breath gently',              dur: 7, color: '#534AB7' },
    { name: 'Exhale', sub: 'breathe out fully through your mouth', dur: 8, color: '#D85A30' }
  ];
  let bRunning = false, bTimer = null, bCycle = 0, bPhase = 0;
  function setRing(p, color) {
    const r = document.getElementById('breath-ring');
    if (r) { r.style.stroke = color; r.style.strokeDashoffset = CIRC * (1 - p); }
  }
  function updateDots() { for (let i=0;i<4;i++) { const d=document.getElementById('cd'+i); if(d) d.className='cycle-dot'+(i<bCycle?' done':''); } }
  function nextPhase() {
    const ph = PHASES[bPhase];
    let left = ph.dur;
    const lbl = document.getElementById('phase-label');
    const sub = document.getElementById('phase-sub');
    const cnt = document.getElementById('breath-count');
    if (lbl) lbl.textContent = ph.name;
    if (sub) sub.textContent = ph.sub;
    if (cnt) cnt.textContent = left;
    const r = document.getElementById('breath-ring');
    if (r) { r.style.transition = 'none'; }
    setRing(0, ph.color);
    let elapsed = 0;
    bTimer = setInterval(() => {
      elapsed++; left = ph.dur - elapsed;
      if (cnt) cnt.textContent = left > 0 ? left : '';
      if (r) r.style.transition = 'stroke-dashoffset 1s linear';
      setRing(elapsed / ph.dur, ph.color);
      if (elapsed >= ph.dur) {
        clearInterval(bTimer); bPhase++;
        if (bPhase >= PHASES.length) {
          bPhase = 0; bCycle++; updateDots();
          if (bCycle >= 4) {
            bRunning = false;
            if (lbl) lbl.textContent = 'Complete';
            if (sub) sub.textContent = 'Great work. Notice how you feel.';
            if (cnt) cnt.textContent = '';
            setRing(1, '#1D9E75');
            const btn = document.getElementById('breath-btn');
            if (btn) { btn.textContent = 'Again'; btn.className = 'btn'; }
            const ct = document.getElementById('cycles-text');
            if (ct) ct.textContent = '4 cycles done';
            return;
          }
          const ct = document.getElementById('cycles-text');
          if (ct) ct.textContent = (4-bCycle)+' cycle'+(4-bCycle!==1?'s':'')+' left';
        }
        nextPhase();
      }
    }, 1000);
  }
  function reset() {
    clearInterval(bTimer); bCycle = 0; bPhase = 0; updateDots();
    const lbl=document.getElementById('phase-label');
    const sub=document.getElementById('phase-sub');
    const cnt=document.getElementById('breath-count');
    const ct=document.getElementById('cycles-text');
    if (lbl) lbl.textContent='Ready';
    if (sub) sub.textContent='4 counts in · 7 hold · 8 out';
    if (cnt) cnt.textContent='-';
    if (ct) ct.textContent='4 cycles total';
    setRing(0,'#1D9E75');
  }
  window.handleBreath = function() {
    const btn = document.getElementById('breath-btn');
    if (!bRunning) {
      bRunning = true; reset();
      if (btn) { btn.textContent='Stop'; btn.className='btn'; }
      nextPhase();
    } else {
      bRunning = false; clearInterval(bTimer); reset();
      if (btn) { btn.textContent='Start'; btn.className='btn primary'; }
    }
  };
}

      c.innerHTML='<div class="complete-screen"><div style="font-size:48px;margin-bottom:12px;">✅</div><div class="complete-title">You\'re ready to compete</div><div class="complete-sub">Your mind is primed. Trust your prep,<br>trust your training, go be great.</div><div class="complete-badge">Mental prep complete</div><br><button class="btn-full" style="max-width:200px;margin:0 auto;" onclick="pgReset()">Start over</button></div>';
      return;
    }
    const pct=Math.round(((pgStep+1)/STEPS.length)*100);
    if(pb)pb.style.width=pct+'%';
    if(ctr)ctr.textContent='Step '+(pgStep+1)+' of '+STEPS.length;
    const s=STEPS[pgStep];
    let html='<div class="step-card"><div class="step-header"><div class="step-num active">'+(pgStep+1)+'</div><div class="step-name">'+s.name+'</div><span style="margin-left:auto;font-size:12px;color:#aaa;">'+s.duration+'</span></div><div class="step-desc">'+s.desc+'</div>';
    if(s.type==='read'){html+='<button class="btn-full purple-full" onclick="pgDone()">I\'m ready, continue</button>';}
    else if(s.type==='timer'){html+='<div class="timer-big" id="pg-timer">'+fmt(pgTLeft||s.secs)+'</div><div class="two-btns"><button class="btn-full'+(pgTRunning?'':' purple-full')+'" onclick="pgToggleTimer('+s.secs+')">'+(pgTRunning?'Pause':'Start timer')+'</button><button class="btn-full" onclick="pgDone()">Skip</button></div>';}
    else if(s.type==='write'){html+='<textarea class="write-area" rows="3" placeholder="'+s.placeholder+'" id="pg-write" oninput="pgText[pgStep]=this.value">'+pgText[pgStep]+'</textarea><button class="btn-full purple-full" onclick="pgDone()">Done</button>';}
    else if(s.type==='affirmation'){html+='<div class="affirmation-box" id="pg-affirm">"'+AFFIRMS[pgAffirm]+'"</div><button class="shuffle-btn" onclick="pgShuffleAffirm()">Try a different one</button><button class="btn-full purple-full" onclick="pgDone()">I said it aloud</button>';}
    html+='</div>';
    for(let i=pgStep+1;i<STEPS.length;i++){html+='<div class="locked-row"><div class="step-num locked-num">'+(i+1)+'</div><div class="locked-name">'+STEPS[i].name+'</div><span style="margin-left:auto;font-size:12px;color:#aaa;">'+STEPS[i].duration+'</span></div>';}
    c.innerHTML=html;
  }
  window.pgDone=function(){clearInterval(pgTInt);pgTRunning=false;pgTLeft=0;pgStep++;pgRender();};
  window.pgToggleTimer=function(total){
    if(pgTRunning){clearInterval(pgTInt);pgTRunning=false;pgRender();return;}
    if(!pgTLeft)pgTLeft=total;
    pgTRunning=true;pgRender();
    pgTInt=setInterval(()=>{pgTLeft--;const el=document.getElementById('pg-timer');if(el)el.textContent=fmt(pgTLeft);if(pgTLeft<=0){clearInterval(pgTInt);pgTRunning=false;pgTLeft=0;pgDone();}},1000);
  };
  window.pgShuffleAffirm=function(){pgAffirm=(pgAffirm+1)%AFFIRMS.length;const el=document.getElementById('pg-affirm');if(el)el.textContent='"'+AFFIRMS[pgAffirm]+'"';};
  window.pgReset=function(){pgStep=0;pgText=new Array(6).fill('');pgAffirm=0;clearInterval(pgTInt);pgTRunning=false;pgTLeft=0;pgRender();};

  // Inject faith content into injury tab
  const injuryPromptEl = document.getElementById('injury-faith-prompt');
  if (injuryPromptEl) injuryPromptEl.textContent = fc.injuryPrompt;

  pgRender();
}

const BREAK_ACTIVITIES = [
  { title: 'Box breathing reset', desc: 'Breathe in 4 counts, hold 4, out 4, hold 4. Repeat 4 times. Resets your nervous system in under 2 minutes.' },
  { title: 'Stand up and stretch', desc: 'Roll your shoulders back, reach your arms overhead, touch your toes. Sitting compresses your spine and reduces blood flow to your brain.' },
  { title: 'Look out a window for 2 minutes', desc: 'Your eyes have been focused at close range for 45 minutes. Looking at a distant point relaxes your eye muscles and reduces tension headaches.' },
  { title: 'Drink a full glass of water', desc: 'Dehydration — even mild — reduces cognitive performance. Most students are mildly dehydrated without knowing it. Drink a full glass right now.' },
  { title: 'Walk around for 5 minutes', desc: 'Even a short walk increases blood flow to your brain, improves mood, and helps consolidate what you just studied. Seriously — movement is a study tool.' },

function renderBreak(el) {
  const studyMins = 45, breakMins = 5;
  const totalSecs = breakRunning ? breakLeft : (breakMode === 'study' ? studyMins * 60 : breakMins * 60);
  const mins = Math.floor(totalSecs / 60);

  const activity = BREAK_ACTIVITIES[breakActivityIdx];

  el.innerHTML = `
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:12px;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;">${breakMode === 'study' ? '📚 Study session' : '☕ Break time'}</div>
      <div class="break-circle" style="border-color:${breakMode==='study'?'#1D9E75':'#534AB7'};">
        <div class="break-time" id="break-display">${mins}:${secs<10?'0':''}${secs}</div>
        <div class="break-label">${breakMode === 'study' ? 'focus' : 'rest'}</div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button class="btn ${breakRunning?'':'primary'}" id="break-main-btn" onclick="toggleBreakTimer(${studyMins},${breakMins})">${breakRunning ? 'Pause' : (breakLeft > 0 ? 'Resume' : 'Start')}</button>
        <button class="btn" onclick="resetBreakTimer()">Reset</button>

      <div style="font-size:13px;color:#555;line-height:1.6;">Study for <strong>45 minutes</strong>, take a <strong>5 minute break</strong>. Repeat. This is based on the Pomodoro technique — one of the most research-backed study methods for focus and retention.</div>
    </div>

    <div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">For your next break</div>
    <div class="break-activity">
      <div class="break-activity-title">${activity.title}</div>
      <div class="break-activity-desc">${activity.desc}</div>
    </div>
    <button style="font-size:12px;color:#534AB7;background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;" onclick="nextBreakActivity()">Different suggestion</button>`;

window.toggleBreakTimer = function(studyMins, breakMins) {
  if (breakRunning) {
    clearInterval(breakTimer);
    breakRunning = false;
    renderStudentContent();
    return;
  }
  if (!breakLeft) breakLeft = studyMins * 60;
  breakRunning = true;
  renderStudentContent();
  breakTimer = setInterval(() => {
    breakLeft--;
    const mins = Math.floor(breakLeft / 60);
    const secs = breakLeft % 60;
    const disp = document.getElementById('break-display');
    if (disp) disp.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
    if (breakLeft <= 0) {
      clearInterval(breakTimer);
      breakRunning = false;
      if (breakMode === 'study') {
        breakMode = 'break';
        breakLeft = breakMins * 60;
        breakActivityIdx = Math.floor(Math.random() * BREAK_ACTIVITIES.length);
      } else {
        breakMode = 'study';
        breakLeft = studyMins * 60;
      }
      renderStudentContent();
    }
  }, 1000);
};

window.resetBreakTimer = function() {
  clearInterval(breakTimer);
  breakRunning = false;
  breakLeft = 0;
  breakMode = 'study';
  renderStudentContent();
};

window.nextBreakActivity = function() {
  breakActivityIdx = (breakActivityIdx + 1) % BREAK_ACTIVITIES.length;
  renderStudentContent();
};

const BURNOUT_QUESTIONS_STUDENT = [
  { id: 'energy', text: 'How is your energy level day to day right now?' },
  { id: 'motivation', text: 'How motivated do you feel to do the things you normally care about?' },

const BURNOUT_QUESTIONS_ATHLETE = [
  { id: 'energy', text: 'How is your physical and mental energy day to day?' },
  { id: 'motivation', text: 'How motivated do you feel to train and compete right now?' },
  { id: 'sleep', text: 'How is your sleep and physical recovery?' },
  { id: 'overwhelm', text: 'How often do you feel overwhelmed by your sport and school combined?' },
  { id: 'joy', text: 'How much joy are you getting from your sport right now?' },
  { id: 'focus', text: 'How is your mental focus and sharpness during practice or games?' }
];
function getBurnoutQuestions() {
  return (currentUser && currentUser.role === 'athlete') ? BURNOUT_QUESTIONS_ATHLETE : BURNOUT_QUESTIONS_STUDENT;
}

function renderBurnout(el) {
  var BURNOUT_QUESTIONS = getBurnoutQuestions();
  var h = '<div style="font-size:13px;color:#888;margin-bottom:16px;line-height:1.5;">Answer honestly. This is just for you.</div>';
  for (var i = 0; i < BURNOUT_QUESTIONS.length; i++) {
    var q = BURNOUT_QUESTIONS[i];
    h += '<div class="burnout-q">';
    h += '<div class="burnout-q-text">' + (i+1) + '. ' + q.text + '</div>';
    h += '<div class="burnout-scale" id="bscale-' + q.id + '">';
    for (var v = 1; v <= 5; v++) {
      var lbl = v === 1 ? '1<br><span style="font-size:10px;">Low</span>' : v === 5 ? '5<br><span style="font-size:10px;">High</span>' : String(v);
      h += '<button class="burnout-btn" data-qid="' + q.id + '" data-qval="' + v + '" onclick="handleBurnoutClick(this)">' + lbl + '</button>';
    }
    h += '</div></div>';
  }
  h += '<div style="font-size:12px;color:#aaa;margin:8px 0 10px;text-align:right;" id="burnout-progress">0 of ' + BURNOUT_QUESTIONS.length + ' answered</div>';
  h += '<button class="btn-full primary" onclick="submitBurnout()" id="burnout-submit-btn" style="opacity:0.4;" disabled>See my results</button>';
  el.innerHTML = h;
  // Restore any existing answers visually
  var ids = Object.keys(burnoutAnswers);
  for (var i = 0; i < ids.length; i++) {
    updateBurnoutRow(ids[i], burnoutAnswers[ids[i]]);
  }
  updateBurnoutProgress();
}

function updateBurnoutRow(qid, val) {
  var scale = document.getElementById('bscale-' + qid);
  if (!scale) return;
  var btns = scale.querySelectorAll('.burnout-btn');
  for (var i = 0; i < btns.length; i++) {
    var v = parseInt(btns[i].getAttribute('data-qval'));
    btns[i].className = 'burnout-btn';
    if (v === val) {
      btns[i].className += v <= 2 ? ' sel-high' : v === 3 ? ' sel-mid' : ' sel-low';
    }
  }
}

function updateBurnoutProgress() {
  var BURNOUT_QUESTIONS = getBurnoutQuestions();
  var count = 0;
  for (var i = 0; i < BURNOUT_QUESTIONS.length; i++) {
    if (burnoutAnswers[BURNOUT_QUESTIONS[i].id] !== undefined) count++;
  }
  var prog = document.getElementById('burnout-progress');
  var btn = document.getElementById('burnout-submit-btn');
  if (prog) prog.textContent = count + ' of ' + BURNOUT_QUESTIONS.length + ' answered';
  if (btn) {
    if (count === BURNOUT_QUESTIONS.length) {
      btn.disabled = false;
      btn.style.opacity = '1';
    } else {
      btn.disabled = true;
      btn.style.opacity = '0.4';
    }
  }
}

window.handleBurnoutClick = function(btn) {
  var id = btn.getAttribute('data-qid');
  var val = parseInt(btn.getAttribute('data-qval'));
  if (!id || isNaN(val)) return;
  burnoutAnswers[id] = val;
  updateBurnoutRow(id, val);
  updateBurnoutProgress();
};


window.submitBurnout = function() {
  var el = document.getElementById('student-content');
  if (el) renderBurnoutResult(el);
};

function renderBurnoutResult(el) {
  var BURNOUT_QUESTIONS = getBurnoutQuestions();
  const total = Object.values(burnoutAnswers).reduce((a, b) => a + b, 0);
  const max = BURNOUT_QUESTIONS.length * 5;
  const pct = Math.round((total / max) * 100);
  let level, color, textColor, title, advice;
  if (pct >= 70) {
    level = 'Doing well'; color = '#E1F5EE'; textColor = '#085041';
    title = 'You\'re in a good place right now.';
    advice = ['Keep protecting what\'s working — your sleep, your social time, your recovery habits.', 'Check in again at the start of next week or before a stressful stretch.', 'Even when things feel good, one small daily habit for your mental health goes a long way.'];
  } else if (pct >= 45) {
    level = 'Early warning signs'; color = '#FAEEDA'; textColor = '#633806';
    title = 'You\'re managing, but some things are slipping.';
    advice = ['This is the most important time to act — before it becomes full burnout.', 'Identify one thing that\'s draining you most and see if you can reduce it or ask for help.', 'Add one recovery activity this week — even 20 minutes of something just for you.', 'Sleep and movement are your two best tools right now. Protect them first.', 'Talk to someone you trust about how you\'re actually feeling — not the edited version.'];
  } else {
    level = 'High burnout risk'; color = '#FCEBEB'; textColor = '#A32D2D';
    title = 'You\'re running on empty. This needs attention now.';
    advice = ['What you\'re feeling is real and it\'s serious — burnout doesn\'t fix itself by pushing through.', 'The most important thing right now is honesty: with yourself, and ideally with someone who can help.', 'Talk to your academic advisor about your workload. Talk to a counselor about how you\'re feeling.', 'You cannot pour from an empty cup. Something has to give — and it\'s better to choose what that is than to crash.', 'Consider reaching out to campus counseling this week. Not because something is wrong with you — because you\'re human and you need support.', 'One small thing today: eat a real meal, go outside, sleep at a decent hour. Start there.'];
  }
  el.innerHTML = `
    <div style="background:${color};border-radius:14px;padding:16px;margin-bottom:16px;text-align:center;">
      <div style="font-size:11px;color:${textColor};font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">${level}</div>
      <div style="font-size:28px;font-weight:700;color:${textColor};margin-bottom:6px;">${pct}%</div>
      <div style="font-size:14px;color:${textColor};font-weight:500;">${title}</div>
    </div>
    <div style="margin-bottom:16px;">
      ${advice.map(a => `<div style="display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;">
        <div style="width:6px;height:6px;border-radius:50%;background:${textColor};opacity:0.6;flex-shrink:0;margin-top:6px;"></div>
        <div style="font-size:13px;color:#333;line-height:1.7;">${a}</div>
      </div>`).join('')}
    </div>
    <button class="btn-full" onclick="burnoutAnswers={};var el=document.getElementById('student-content');if(el)renderBurnout(el);">Take it again</button>`;
}

// ── MOOD HISTORY ──
function renderMoodHistory() {
  var container = document.getElementById('mood-history-container');
  if (!container) return;
  var history = getMoodHistory();
  if (history.length === 0) {
    container.innerHTML = '<div style="background:#f9f9f7;border-radius:12px;padding:16px;text-align:center;"><div style="font-size:13px;color:#aaa;line-height:1.6;">No check-ins yet.<br>Start by selecting your mood on the home screen each day.</div></div>';
    return;
  }

  var days = window._moodRange || 30;
  var today = new Date();
  var slots = [];
  for (var i = days - 1; i >= 0; i--) {
    var d = new Date(today);
    d.setDate(today.getDate() - i);
    var dateStr = d.toISOString().split('T')[0];
    var entry = null;
    for (var j = 0; j < history.length; j++) { if (history[j].date === dateStr) { entry = history[j]; break; } }
    slots.push({ date: dateStr, mood: entry ? entry.mood : null, day: d.getDate() });
  }

  var filled = slots.filter(function(s){ return s.mood !== null; });
  var avg = filled.length ? (filled.reduce(function(a,b){ return a+b.mood; }, 0) / filled.length).toFixed(1) : null;
  var streak = 0;
  for (var i = slots.length - 1; i >= 0; i--) { if (slots[i].mood !== null) { streak++; } else { break; } }
  var moodLabels = {1:'Rough',2:'Meh',3:'Okay',4:'Good',5:'Great'};
  var moodColors = {1:'#F09595',2:'#FAC775',3:'#B5D4F4',4:'#9FE1CB',5:'#5DCAA5'};
  var avgF = avg ? parseFloat(avg) : 0;
  var rangeLabel = avg ? (avgF >= 4 ? 'Trending positive this period' : avgF >= 3 ? 'Mixed — keep showing up' : 'Tough stretch — consider reaching out') : '';

  var html = '';
  html += '<div style="display:flex;gap:6px;margin-bottom:14px;">';
  [7,14,30].forEach(function(r) {
    var active = days === r;
    html += '<button onclick="window._moodRange='+r+';renderMoodHistory()" style="padding:5px 12px;border-radius:20px;border:1px solid '+(active?'#1D9E75':'#e5e5e0')+';background:'+(active?'#E1F5EE':'#f9f9f7')+';color:'+(active?'#085041':'#888')+';font-size:12px;font-weight:'+(active?'600':'400')+';cursor:pointer;font-family:inherit;">'+r+' days</button>';
  });
  html += '</div>';

  if (avg) {
    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">';
    html += '<div style="background:#f9f9f7;border-radius:10px;padding:10px;text-align:center;"><div style="font-size:10px;color:#aaa;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">Avg mood</div><div style="font-size:22px;font-weight:700;color:#1a1a1a;">'+avg+'</div><div style="font-size:10px;color:#aaa;">out of 5</div></div>';
    html += '<div style="background:#f9f9f7;border-radius:10px;padding:10px;text-align:center;"><div style="font-size:10px;color:#aaa;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">Streak</div><div style="font-size:22px;font-weight:700;color:#1a1a1a;">'+streak+'</div><div style="font-size:10px;color:#aaa;">day'+(streak!==1?'s':'')+' </div></div>';
    html += '<div style="background:#f9f9f7;border-radius:10px;padding:10px;text-align:center;"><div style="font-size:10px;color:#aaa;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">Check-ins</div><div style="font-size:22px;font-weight:700;color:#1a1a1a;">'+filled.length+'</div><div style="font-size:10px;color:#aaa;">logged</div></div>';
    html += '</div>';
    var insightColor = avgF >= 4 ? '#085041' : avgF >= 3 ? '#633806' : '#A32D2D';
    var insightBg = avgF >= 4 ? '#E1F5EE' : avgF >= 3 ? '#FAEEDA' : '#FCEBEB';
    html += '<div style="background:'+insightBg+';border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:'+insightColor+';font-weight:500;">'+rangeLabel+'</div>';
  }

  var maxBarH = 56;
  html += '<div style="overflow-x:auto;">';
  html += '<div style="display:flex;align-items:flex-end;gap:2px;height:'+(maxBarH+4)+'px;min-width:'+(slots.length*16)+'px;">';
  slots.forEach(function(slot) {
    var h = slot.mood ? Math.max(4, Math.round((slot.mood/5)*maxBarH)) : 4;
    var color = slot.mood ? moodColors[slot.mood] : '#eeece8';
    html += '<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:14px;">';
    html += '<div style="width:100%;height:'+h+'px;background:'+color+';border-radius:3px 3px 0 0;"></div>';
    html += '</div>';
  });
  html += '</div>';

  html += '<div style="display:flex;gap:2px;min-width:'+(slots.length*16)+'px;margin-top:3px;">';
  slots.forEach(function(slot, i) {
    var show = i === 0 || i === slots.length-1 || (days <= 7) || (days === 14 && i % 2 === 0) || (days === 30 && i % 5 === 0);
    html += '<div style="flex:1;min-width:14px;text-align:center;font-size:9px;color:#bbb;">'+(show?slot.day:'')+'</div>';
  });
  html += '</div></div>';

  html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;">';
  [[5,'Great','#5DCAA5'],[4,'Good','#9FE1CB'],[3,'Okay','#B5D4F4'],[2,'Meh','#FAC775'],[1,'Rough','#F09595']].forEach(function(item) {
    html += '<div style="display:flex;align-items:center;gap:4px;"><div style="width:10px;height:10px;border-radius:2px;background:'+item[2]+'"></div><span style="font-size:11px;color:#888;">'+item[1]+'</span></div>';
  });
  html += '</div>';

  container.innerHTML = html;
}

var peerSituation = null;
var peerStoryIdx = 0;

function initPeerSupport() {
  peerSituation = null;
  peerStoryIdx = 0;
  var homeEl = document.getElementById('peer-home');
  var matchEl = document.getElementById('peer-matching');
  var storyEl = document.getElementById('peer-story');
  if (homeEl) homeEl.style.display = 'block';
  if (matchEl) matchEl.style.display = 'none';
  if (storyEl) storyEl.style.display = 'none';
  renderPeerSituations();
}

function renderPeerSituations() {
  var el = document.getElementById('peer-situations');
  if (!el) return;
  var h = '';
  PEER_SITUATIONS.forEach(function(sit) {
    h += '<div class="card" onclick="selectPeerSituation(\'' + sit.id + '\')" style="display:flex;align-items:center;gap:12px;">';
    h += '<div style="font-size:24px;flex-shrink:0;">' + sit.emoji + '</div>';
    h += '<div><div class="card-title" style="margin-bottom:2px;">' + sit.label + '</div></div>';
    h += '<div style="margin-left:auto;font-size:18px;color:#aaa;">&#8250;</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function selectPeerSituation(id) {
  peerSituation = id;
  peerStoryIdx = 0;
  var homeEl = document.getElementById('peer-home');
  var matchEl = document.getElementById('peer-matching');
  if (homeEl) homeEl.style.display = 'none';
  if (matchEl) {
    matchEl.style.display = 'block';
    matchEl.innerHTML = '<div style="text-align:center;padding:3rem 1rem;">'
      + '<div style="font-size:48px;margin-bottom:16px;">&#128101;</div>'
      + '<div style="font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:8px;">Finding someone who gets it...</div>'
      + '<div id="match-status" style="font-size:13px;color:#888;margin-bottom:24px;">Looking through people with similar experiences</div>'
      + '<div style="height:4px;background:#f0f0ec;border-radius:2px;overflow:hidden;"><div id="match-bar" style="height:4px;background:#1D9E75;width:0%;border-radius:2px;transition:width 0.4s;"></div></div>'
      + '</div>';
    var msgs = ['Looking through people with similar experiences...', 'Found a few who match your situation...', 'Reading through their stories...', 'Found someone who really gets it'];
    var progress = 0;
    var msgIdx = 0;
    var bar = document.getElementById('match-bar');
    var status = document.getElementById('match-status');
    var interval = setInterval(function() {
      progress += 8;
      if (bar) bar.style.width = Math.min(progress, 95) + '%';
      if (progress % 25 === 0 && msgIdx < msgs.length - 1) {
        msgIdx++;
        if (status) status.textContent = msgs[msgIdx];
      }
      if (progress >= 100) {
        clearInterval(interval);
        setTimeout(function() { showPeerStory(); }, 400);
      }
    }, 120);
  }
}

function showPeerStory() {
  var stories = PEER_STORIES[peerSituation];
  if (!stories || stories.length === 0) return;
  var story = stories[peerStoryIdx % stories.length];
  var matchEl = document.getElementById('peer-matching');
  var storyEl = document.getElementById('peer-story');
  if (matchEl) matchEl.style.display = 'none';
  if (!storyEl) return;
  storyEl.style.display = 'block';

  var paragraphs = story.story.split('\n\n');
  var storyHtml = paragraphs.map(function(p) {
    return '<p style="font-size:13px;color:#333;line-height:1.8;margin-bottom:12px;">' + p + '</p>';
  }).join('');

  var h = '';
  h += '<button onclick="initPeerSupport()" style="background:none;border:none;color:#888;font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:16px;">&larr; Back</button>';
  h += '<div style="background:#f9f9f7;border-radius:14px;padding:14px;margin-bottom:16px;">';
  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">';
  h += '<div style="width:38px;height:38px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#0F6E56;flex-shrink:0;">' + story.handle.charAt(0) + '</div>';
  h += '<div><div style="font-size:14px;font-weight:600;color:#1a1a1a;">' + story.handle + '</div><div style="font-size:12px;color:#888;">' + story.role + '</div></div>';
  h += '<div style="margin-left:auto;"><span class="badge">' + story.detail + '</span></div>';
  h += '</div></div>';

  h += '<div class="section-label">Their story</div>';
  h += '<div style="margin-bottom:20px;">' + storyHtml + '</div>';

  h += '<div style="background:#E1F5EE;border-radius:12px;padding:14px;margin-bottom:16px;">';
  h += '<div style="font-size:11px;color:#085041;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">What helped them</div>';
  story.helped.forEach(function(tip) {
    h += '<div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;">';
    h += '<div style="width:6px;height:6px;border-radius:50%;background:#1D9E75;flex-shrink:0;margin-top:6px;"></div>';
    h += '<div style="font-size:13px;color:#085041;line-height:1.6;">' + tip + '</div>';
    h += '</div>';
  });
  h += '</div>';

  h += '<div class="section-label">Does this resonate with you?</div>';
  h += '<div style="font-size:13px;color:#888;margin-bottom:10px;line-height:1.5;">Write freely — this is just for you. It helps to put your own experience into words.</div>';
  h += '<textarea class="write-area" rows="4" placeholder="What does this bring up for you? What parts of their story felt familiar?"></textarea>';
  h += '<button class="btn-full primary" onclick="this.textContent=\'Saved\';this.style.background=\'#0F6E56\'" style="margin-bottom:12px;">Save my reflection</button>';

  if (stories.length > 1 || true) {
    h += '<button class="btn-full" onclick="peerStoryIdx++;showPeerStory()">Show me someone else\'s story</button>';
  }
  h += '<div class="divider"></div>';
  h += '<div style="background:#FCEBEB;border-radius:12px;padding:14px;font-size:12px;color:#A32D2D;line-height:1.6;">';
  h += '<div style="font-weight:700;margin-bottom:6px;font-size:13px;">Important reminder</div>';
  h += 'This is peer support — not therapy or professional mental health advice. Stories reflect personal experiences only and are not a substitute for professional help.<br><br>';
  h += '<strong>If you are in crisis, call or text 988 immediately.</strong><br><br>';
  h += '<a href="tel:988" style="color:#A32D2D;font-weight:700;">Call 988 now ›</a>';
  h += '</div>';

  storyEl.innerHTML = h;
}

setTimeout(function() {
  if (document.getElementById('peer-situations')) initPeerSupport();
}, 60);

window.submitStory = function() {
  var story = document.getElementById('share-story');
  var helped = document.getElementById('share-helped');
  var advice = document.getElementById('share-advice');
  var ageConfirm = document.getElementById('share-age-confirm');

  if (!shareSituation) {
    alert('Please select a situation first.');
    return;
  }
  if (!story || story.value.trim().split(/\s+/).filter(function(w){ return w; }).length < 30) {
    alert('Please write at least 30 words in your story — the more real the better.');
    return;
  }
  if (!helped || helped.value.trim().length < 10) {
    alert('Please fill in what helped you.');
    return;
  }
  if (!advice || advice.value.trim().length < 10) {
    alert('Please add your piece of advice.');
    return;
  }
  if (!ageConfirm || !ageConfirm.checked) {
    alert('Please confirm you are 18 or older and that this story is your own experience.');
    return;
  }

  // Save submission to localStorage for review
  var key = 'resurgo_submissions';
  var subs = JSON.parse(localStorage.getItem(key) || '[]');
  subs.push({
    ts: Date.now(),
    situation: shareSituation,
    story: story.value.trim(),
    helped: helped.value.trim(),
    advice: advice.value.trim(),
    status: 'pending'
  });
  localStorage.setItem(key, JSON.stringify(subs));

  // Show confirmation
  var formView = document.getElementById('share-form-view');
  var doneView = document.getElementById('share-submitted-view');
  if (formView) formView.style.display = 'none';
  if (doneView) doneView.style.display = 'block';
};

function makeCard(title, badge, badgeClass, sub, action) {
  return '<div class="card" onclick="' + action + '"><div class="card-row"><div class="card-title">' + title + '</div><span class="badge ' + (badgeClass || '') + '">' + badge + '</span></div><div class="card-sub">' + sub + '</div></div>';

function renderSmartHome() {
  var bannerEl = document.getElementById('smart-home-banner');
  var cardsEl = document.getElementById('smart-home-cards');
  if (!bannerEl || !cardsEl) return;

  var history = getMoodHistory(7);
  var recentMoods = history.slice(-3).map(function(e) { return e.mood; });
  var isAthlete = currentUser && currentUser.role === 'athlete';
  var allHistory = getMoodHistory(30);
  var today = new Date().toDateString();
  var checkedInToday = allHistory.length > 0 && new Date(allHistory[allHistory.length-1].date).toDateString() === today;

  var streak = 0;
  for (var i = allHistory.length - 1; i >= 0; i--) {
    var d = new Date(allHistory[i].date);
    var expected = new Date();
    expected.setDate(expected.getDate() - (allHistory.length - 1 - i));
    if (d.toDateString() === expected.toDateString()) streak++;
    else break;
  }

  var lowMoods = recentMoods.filter(function(m) { return m <= 2; }).length;
  var highMoods = recentMoods.filter(function(m) { return m >= 4; }).length;

  var banner = '';
  if (!checkedInToday) {
    banner = '<div style="background:var(--amber-bg);border-radius:14px;padding:14px 16px;margin-bottom:12px;border-left:4px solid #C4900A;"><div style="font-size:13px;font-weight:700;color:var(--amber-text);margin-bottom:3px;">Check in today</div><div style="font-size:12px;color:var(--amber-text);opacity:0.85;">You have not checked in yet. How are you feeling?</div></div>';
  } else if (lowMoods >= 2) {
    banner = '<div style="background:var(--coral-bg);border-radius:14px;padding:14px 16px;margin-bottom:12px;border-left:4px solid #C44B35;"><div style="font-size:13px;font-weight:700;color:var(--coral-text);margin-bottom:3px;">Tough stretch — you are not alone</div><div style="font-size:12px;color:var(--coral-text);opacity:0.85;">It is okay to not be okay. Here are some things that might help.</div></div>';
  } else if (streak >= 5) {
    banner = '<div style="background:var(--green-pale);border-radius:14px;padding:14px 16px;margin-bottom:12px;border-left:4px solid var(--green-mid);"><div style="font-size:13px;font-weight:700;color:var(--green-dark);margin-bottom:3px;">' + streak + '-day streak</div><div style="font-size:12px;color:var(--green-dark);opacity:0.85;">You are showing up for yourself every day. Keep it going.</div></div>';
  } else if (highMoods >= 2) {
    banner = '<div style="background:var(--green-pale);border-radius:14px;padding:14px 16px;margin-bottom:12px;border-left:4px solid var(--green-mid);"><div style="font-size:13px;font-weight:700;color:var(--green-dark);margin-bottom:3px;">You have been doing well</div><div style="font-size:12px;color:var(--green-dark);opacity:0.85;">Keep the momentum going.</div></div>';
  }
  bannerEl.innerHTML = banner;

  var cards = [];
  if (lowMoods >= 2) {
    cards.push(makeCard('4-7-8 breathing', '3 min', '', 'Calm your nervous system right now', "openTool('breathe')"));
    cards.push(makeCard('Peer support', 'Connect', 'purple', 'Read stories from people who get it', "showTab('connect')"));
    cards.push(makeCard('Guided journal', 'Reflect', '', 'Writing helps process what you are carrying', "showTab('journal')"));
    if (isAthlete) cards.push(makeCard('Burnout check-in', 'Check in', 'coral', 'See where you are at', "openTool('burnout')"));
  } else if (highMoods >= 2 || streak >= 5) {
    if (isAthlete) {
      cards.push(makeCard('Pre-game mental prep', 'Athlete', 'purple', 'Faith-personalized 6-step routine', "openTool('pregame')"));
    } else {
      cards.push(makeCard('Exam anxiety toolkit', 'Student', '', 'Step-by-step guide for every exam phase', "openTool('exam')"));
    }
    cards.push(makeCard('Guided journal', 'Reflect', '', 'Prompts personalized to you', "showTab('journal')"));
    cards.push(makeCard('Your mood history', 'Progress', '', 'See how far you have come', "showTab('you')"));
  } else {
    cards.push(makeCard('4-7-8 breathing', '3 min', '', 'Calm your nervous system instantly', "openTool('breathe')"));
    if (isAthlete) {
      cards.push(makeCard('Pre-game mental prep', 'Athlete', 'purple', 'Faith-personalized 6-step routine', "openTool('pregame')"));
    } else {
      cards.push(makeCard('Exam anxiety toolkit', 'Student', '', 'Step-by-step guide for every exam phase', "openTool('exam')"));
    }
    cards.push(makeCard('Peer support', 'Connect', 'purple', 'Read stories from people who get it', "showTab('connect')"));
    cards.push(makeCard('Guided journal', 'Reflect', '', 'Prompts personalized to you', "showTab('journal')"));
  }
  cardsEl.innerHTML = cards.join('');
}

render();
render();
</script>
